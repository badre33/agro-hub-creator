# Netlify config — boutique Broccagri
# Vite build directement dans dist/boutique/ (cf. vite.config.ts).
# Les fichiers sont physiquement à l'emplacement attendu par les URLs avec base /boutique/.
# Donc pas de rewrites compliqués : juste un SPA fallback et une redirection racine.

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Cache long pour les assets versionnés par Vite
[[headers]]
  for = "/boutique/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# En-têtes de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA fallback : toute route /boutique/quelque-chose sans fichier réel
# doit servir /boutique/index.html (qui charge React Router avec basename /boutique).
[[redirects]]
  from = "/boutique/*"
  to = "/boutique/index.html"
  status = 200

# Quelqu'un atteint la racine du domaine → on le redirige vers /boutique/
[[redirects]]
  from = "/"
  to = "/boutique/"
  status = 302
