# Netlify config — boutique Broccagri
# Avec base absolue https://broccagrishop.netlify.app/ dans vite.config.ts,
# les assets sont chargés directement depuis ce domaine, peu importe l'URL
# dans la barre du navigateur (qui sera broccagri.ma/boutique via proxy).
# Du coup la config Netlify reste minimale : juste un SPA fallback.

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Cache long pour les assets versionnés par Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# CORS pour les fonts/static (chargés en cross-origin depuis broccagri.ma)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"

# SPA fallback (React Router avec basename /boutique côté code)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
