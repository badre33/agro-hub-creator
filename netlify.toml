# Netlify config — boutique Broccagri
# Le shop est build avec base='/boutique/' (cf. vite.config.ts) et déployé sur
# un site Netlify dédié. Les URLs des assets dans le HTML buildé commencent par
# /boutique/, mais les fichiers réels sont à dist/{index.html, assets/...}.
# Les redirects ci-dessous traduisent /boutique/* vers les vrais fichiers.

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Cache long pour les assets versionnés par Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# En-têtes de sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# === REDIRECTS — ordre = du plus spécifique au plus général ===

# 1. Assets versionnés Vite : /boutique/assets/foo.js → /assets/foo.js
[[redirects]]
  from = "/boutique/assets/*"
  to = "/assets/:splat"
  status = 200

# 2. Fichiers statiques publics référencés sous /boutique/ par Vite
[[redirects]]
  from = "/boutique/broccagri-logo.png"
  to = "/broccagri-logo.png"
  status = 200

[[redirects]]
  from = "/boutique/favicon.ico"
  to = "/favicon.ico"
  status = 200

[[redirects]]
  from = "/boutique/placeholder.svg"
  to = "/placeholder.svg"
  status = 200

[[redirects]]
  from = "/boutique/robots.txt"
  to = "/robots.txt"
  status = 200

# 3. SPA fallback : toute route /boutique/quelque-chose sans fichier réel
#    doit servir le index.html (qui charge React Router avec basename /boutique).
[[redirects]]
  from = "/boutique/*"
  to = "/index.html"
  status = 200

# 4. Quelqu'un atteint le domaine sans /boutique → on l'envoie vers /boutique/
[[redirects]]
  from = "/"
  to = "/boutique/"
  status = 302
